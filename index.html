<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sound Knot">
<meta name="theme-color" content="#F4F3EE" id="theme-color-meta">
<title>Sound Knot</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #F4F3EE;
    font-family: 'Inter Tight', system-ui, sans-serif;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
  }
  #root {
    height: 100dvh;
    height: 100vh; /* fallback */
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #root > * {
    flex: 1;
    min-height: 0;
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel pinned -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Sample data (plain JS, no Babel) -->
<script src="data.js"></script>

<!-- App components (Babel) -->
<script type="text/babel" data-presets="react" src="icons.jsx"></script>
<script type="text/babel" data-presets="react" src="knot.jsx"></script>
<script type="text/babel" data-presets="react" src="screens.jsx"></script>
<script type="text/babel" data-presets="react" src="practice.jsx"></script>
<script type="text/babel" data-presets="react" src="app.jsx"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
